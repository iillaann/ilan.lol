<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ilan.lol</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="pics/index.html">Pics</a>
    <a href="vids/index.html">Vids</a>
  </nav>

  <audio id="bgm" src="tuffbackgroundmusic.mp3" loop></audio>
  <script>
    const audio = document.getElementById('bgm');
    const startMusic = () => {
      audio.play().catch(() => {});
      document.removeEventListener('click', startMusic);
      document.removeEventListener('keydown', startMusic);
    };
    document.addEventListener('click', startMusic);
    document.addEventListener('keydown', startMusic);
  </script>

  <div class="content">
    <header class="hero">
      <h1>ilan.lol</h1>
      <p class="tagline">A personal corner of the internet</p>
    </header>

    <div class="home-grid">
      <a href="pics/index.html" class="home-card">
        <div class="card-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="48" height="48"><path fill="currentColor" d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
        </div>
        <h2>Pics</h2>
        <p>12 images — photos, screenshots, memes & more</p>
      </a>

      <a href="vids/index.html" class="home-card">
        <div class="card-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="48" height="48"><path fill="currentColor" d="M18 4l11 7-11 7V4zm-2 5.5l6.5 4-6.5 4V9.5z"/></svg>
        </div>
        <h2>Vids</h2>
        <p>2 videos — random clips & downloads</p>
      </a>
    </div>

    <div class="music-player" id="musicPlayer">
      <div class="player-info">
        <svg class="music-icon" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path fill="currentColor" d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        <div>
          <span class="player-title">Now Playing</span>
          <span class="player-track" id="playerTrack">tuffbackgroundmusic.mp3</span>
        </div>
      </div>
      <div class="player-controls">
        <button class="btn-icon" id="btnPrev" aria-label="Previous" disabled>⏮</button>
        <button class="btn-icon btn-play" id="btnPlayPause" aria-label="Play">▶</button>
        <button class="btn-icon" id="btnNext" aria-label="Next" disabled>⏭</button>
      </div>
      <div class="player-progress">
        <input type="range" id="progressBar" min="0" max="100" value="0" aria-label="Playback progress">
        <span class="time" id="currentTime">0:00</span>
        <span class="time" id="duration">0:00</span>
      </div>
      <div class="player-volume">
        <svg class="vol-icon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        <input type="range" id="volumeBar" min="0" max="1" step="0.1" value="0.7" aria-label="Volume">
      </div>
    </div>
  </div>

  <script>
    const audio = document.getElementById('bgm');
    const btnPlayPause = document.getElementById('btnPlayPause');
    const progressBar = document.getElementById('progressBar');
    const volumeBar = document.getElementById('volumeBar');
    const currentTimeEl = document.getElementById('currentTime');
    const durationEl = document.getElementById('duration');

    let isPlaying = false;

    function formatTime(seconds) {
      if (isNaN(seconds)) return '0:00';
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60).toString().padStart(2, '0');
      return `${mins}:${secs}`;
    }

    function updatePlayPause() {
      btnPlayPause.textContent = isPlaying ? '⏸' : '▶';
      btnPlayPause.setAttribute('aria-label', isPlaying ? 'Pause' : 'Play');
    }

    btnPlayPause.addEventListener('click', () => {
      if (audio.paused) {
        audio.play().then(() => {
          isPlaying = true;
          updatePlayPause();
        }).catch(() => {});
      } else {
        audio.pause();
        isPlaying = false;
        updatePlayPause();
      }
    });

    audio.addEventListener('timeupdate', () => {
      progressBar.value = (audio.currentTime / audio.duration) * 100 || 0;
      currentTimeEl.textContent = formatTime(audio.currentTime);
    });

    audio.addEventListener('loadedmetadata', () => {
      durationEl.textContent = formatTime(audio.duration);
    });

    audio.addEventListener('ended', () => {
      isPlaying = false;
      updatePlayPause();
      progressBar.value = 0;
    });

    progressBar.addEventListener('input', () => {
      audio.currentTime = (progressBar.value / 100) * audio.duration;
    });

    volumeBar.addEventListener('input', () => {
      audio.volume = volumeBar.value;
      const volIcon = document.querySelector('.vol-icon');
      if (audio.volume === 0) {
        volIcon.innerHTML = '<path fill="currentColor" d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
      } else if (audio.volume < 0.5) {
        volIcon.innerHTML = '<path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
      } else {
        volIcon.innerHTML = '<path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.9c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>';
      }
    });

    // Initialize volume
    audio.volume = 0.7;

    const startMusic = () => {
      audio.play().catch(() => {});
      document.removeEventListener('click', startMusic);
      document.removeEventListener('keydown', startMusic);
    };
    document.addEventListener('click', startMusic);
    document.addEventListener('keydown', startMusic);
  </script>
</body>
</html>

    <div class="player-seek">

        <svg id="iconVol" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      </button>
      <div class="vol-wrap" id="volWrap">
        <div class="vol-track">
          <div class="vol-fill" id="volFill"></div>
        </div>
        <input type="range" class="vol-input" id="volBar" min="0" max="100" value="70" aria-label="Volume">
      </div>
    </div>
  </div>

  <audio id="bgm" src="tuffbackgroundmusic.mp3" loop preload="metadata"></audio>

  <script>
    /* ---- Music Player ---- */
    const audio = document.getElementById('bgm');
    const btnPlay = document.getElementById('btnPlay');
    const iconPlay = document.getElementById('iconPlay');
    const seekBar = document.getElementById('seekBar');
    const seekFill = document.getElementById('seekFill');
    const seekThumb = document.getElementById('seekThumb');
    const curTime = document.getElementById('curTime');
    const durTime = document.getElementById('durTime');
    const btnMute = document.getElementById('btnMute');
    const iconVol = document.getElementById('iconVol');
    const volBar = document.getElementById('volBar');
    const volFill = document.getElementById('volFill');

    let playing = false;
    let prevVol = 0.7;

    const SVG_PLAY = '<polygon points="6 3 20 12 6 21 6 3"/>';
    const SVG_PAUSE = '<rect x="5" y="4" width="4" height="16"/><rect x="15" y="4" width="4" height="16"/>';
    const SVG_VOL_HIGH = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
    const SVG_VOL_LOW = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>';
    const SVG_VOL_MUTE = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0021 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 003.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';

    function fmt(s) {
      if (isNaN(s)) return '0:00';
      const m = Math.floor(s / 60);
      return m + ':' + String(Math.floor(s % 60)).padStart(2, '0');
    }

    function updatePlayIcon() {
      iconPlay.innerHTML = playing ? SVG_PAUSE : SVG_PLAY;
      btnPlay.setAttribute('aria-label', playing ? 'Pause' : 'Play');
    }

    function updateVolIcon() {
      if (audio.volume === 0 || audio.muted) iconVol.innerHTML = SVG_VOL_MUTE;
      else if (audio.volume < 0.5) iconVol.innerHTML = SVG_VOL_LOW;
      else iconVol.innerHTML = SVG_VOL_HIGH;
    }

    btnPlay.addEventListener('click', () => {
      if (audio.paused) {
        audio.play().then(() => { playing = true; updatePlayIcon(); }).catch(() => {});
      } else {
        audio.pause();
        playing = false;
        updatePlayIcon();
      }
    });

    audio.addEventListener('timeupdate', () => {
      const pct = (audio.currentTime / audio.duration) * 100 || 0;
      seekFill.style.width = pct + '%';
      seekThumb.style.left = pct + '%';
      seekBar.value = (pct / 100) * 1000;
      curTime.textContent = fmt(audio.currentTime);
    });

    audio.addEventListener('loadedmetadata', () => {
      durTime.textContent = fmt(audio.duration);
    });

    audio.addEventListener('ended', () => {
      playing = false;
      updatePlayIcon();
    });

    seekBar.addEventListener('input', () => {
      const pct = seekBar.value / 1000;
      audio.currentTime = pct * audio.duration;
      seekFill.style.width = (pct * 100) + '%';
      seekThumb.style.left = (pct * 100) + '%';
    });

    volBar.addEventListener('input', () => {
      const v = volBar.value / 100;
      audio.volume = v;
      audio.muted = false;
      volFill.style.width = (v * 100) + '%';
      prevVol = v || prevVol;
      updateVolIcon();
    });

    btnMute.addEventListener('click', () => {
      if (audio.muted || audio.volume === 0) {
        audio.muted = false;
        audio.volume = prevVol || 0.7;
        volBar.value = audio.volume * 100;
        volFill.style.width = (audio.volume * 100) + '%';
      } else {
        prevVol = audio.volume;
        audio.muted = true;
        volBar.value = 0;
        volFill.style.width = '0%';
      }
      updateVolIcon();
    });

    audio.volume = 0.7;

    // Auto-play on first interaction
    const startMusic = () => {
      audio.play().then(() => { playing = true; updatePlayIcon(); }).catch(() => {});
      document.removeEventListener('click', startMusic);
      document.removeEventListener('keydown', startMusic);
    };
    document.addEventListener('click', startMusic);
    document.addEventListener('keydown', startMusic);

    /* ---- Scroll Reveal ---- */
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); } });
    }, { threshold: 0.12 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>

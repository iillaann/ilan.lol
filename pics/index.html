<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pics — ilan.lol</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <nav>
    <a href="../index.html">Home</a>
    <a href="index.html">Pics</a>
    <a href="../vids/index.html">Vids</a>
  </nav>

  <audio id="bgm" src="../tuffbackgroundmusic.mp3" loop></audio>
  <script>
    const audio = document.getElementById('bgm');
    const startMusic = () => {
      audio.play().catch(() => {});
      document.removeEventListener('click', startMusic);
      document.removeEventListener('keydown', startMusic);
    };
    document.addEventListener('click', startMusic);
    document.addEventListener('keydown', startMusic);
  </script>

  <div class="content">
    <h1>Pics</h1>
    <p class="gallery-count" id="picCount">Loading...</p>

    <div class="gallery" id="picGallery">
      <!-- Images will be injected here -->
    </div>
  </div>

  <!-- Lightbox Modal -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image preview">
    <button class="lightbox-close" id="lightboxClose" aria-label="Close">×</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="Previous">‹</button>
    <img id="lightboxImg" src="" alt="" />
    <button class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="Next">›</button>
    <p class="lightbox-caption" id="lightboxCaption"></p>
  </div>

  <script>
    const images = [
      "pics/ezgif.com-animated-gif-maker.png",
      "pics/Screenshot 2025-01-20 214150.png",
      "pics/JPOSH.png",
      "pics/sworn.png",
      "pics/12.png",
      "pics/me.gif",
      "pics/2a890d87-fdb3-4a53-adfd-3d6c77e740a0.jpg",
      "pics/boithistuff.png",
      "pics/IMG_3102.PNG",
      "pics/Screenshot 2026-05-10 010035.png",
      "pics/5fbc16546a7f405eac5e0f38ff4ffae9~tplv-jj85edgx6n-image-medium.jpeg",
      "pics/2b1d8d409ddc4de89ff8299c6f481172~tplv-f2jg4exsff-photo-comment-full.webp"
    ];

    const gallery = document.getElementById('picGallery');
    const countEl = document.getElementById('picCount');
    let currentIndex = 0;

    images.forEach((src, i) => {
      const link = document.createElement('a');
      link.href = src;
      link.className = 'gallery-item';
      link.dataset.index = i;
      link.tabIndex = 0;
      link.ariaLabel = `View image ${i + 1} of ${images.length}`;

      const img = document.createElement('img');
      img.src = src;
      img.alt = `Image ${i + 1}`;
      img.loading = 'lazy';
      link.appendChild(img);

      gallery.appendChild(link);
    });

    countEl.textContent = `${images.length} image${images.length !== 1 ? 's' : ''}`;

    // Lightbox logic
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxCaption = document.getElementById('lightboxCaption');
    const closeBtn = document.getElementById('lightboxClose');
    const prevBtn = document.getElementById('lightboxPrev');
    const nextBtn = document.getElementById('lightboxNext');

    function openLightbox(index) {
      currentIndex = index;
      lightboxImg.src = images[currentIndex];
      lightboxImg.alt = `Image ${currentIndex + 1} of ${images.length}`;
      lightboxCaption.textContent = `${currentIndex + 1} / ${images.length}`;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
      lightboxImg.focus();
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
      lightboxImg.src = '';
    }

    function navigate(dir) {
      currentIndex = (currentIndex + dir + images.length) % images.length;
      lightboxImg.src = images[currentIndex];
      lightboxImg.alt = `Image ${currentIndex + 1} of ${images.length}`;
      lightboxCaption.textContent = `${currentIndex + 1} / ${images.length}`;
    }

    gallery.addEventListener('click', (e) => {
      const item = e.target.closest('.gallery-item');
      if (item) {
        e.preventDefault();
        openLightbox(parseInt(item.dataset.index, 10));
      }
    });

    gallery.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        const item = e.target.closest('.gallery-item');
        if (item) {
          e.preventDefault();
          openLightbox(parseInt(item.dataset.index, 10));
        }
      }
    });

    closeBtn.addEventListener('click', closeLightbox);
    prevBtn.addEventListener('click', () => navigate(-1));
    nextBtn.addEventListener('click', () => navigate(1));

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') navigate(-1);
      if (e.key === 'ArrowRight') navigate(1);
    });

    // Preload adjacent images for smoother navigation
    function preloadAdjacent() {
      const prev = (currentIndex - 1 + images.length) % images.length;
      const next = (currentIndex + 1) % images.length;
      [prev, next].forEach(i => {
        const img = new Image();
        img.src = images[i];
      });
    }
    lightboxImg.addEventListener('load', preloadAdjacent);
  </script>
</body>
</html>
